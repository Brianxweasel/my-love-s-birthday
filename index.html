<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Love Birthday 💌</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Comic Sans MS", "Comic Sans", cursive, Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;

      background: linear-gradient(
      to bottom,
      #8ec5ff 0%,
      #b8d8ff 35%,
      #ffd1ea 70%,
      #ff9ecf 100%
      );

      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    /* 🔊 MUSIC CONTROL */
.music-control{
  position:fixed;
  top:20px;
  left:20px;
  z-index:999;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:40px;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(8px);
  cursor:pointer;
}

/* 💿 VINYL */
.vinyl{
  width:45px;
  height:45px;
  border-radius:50%;
  background: radial-gradient(circle at center,
    #111 20%,
    #333 40%,
    #000 70%
  );
  position:relative;

  animation: spin 2s linear infinite;
}

/* lubang tengah */
.vinyl::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  background:#999;
  border-radius:50%;
  transform:translate(-50%, -50%);
}

/* pause state */
.paused .vinyl{
  animation-play-state: paused;
  opacity:0.5;
}

/* ROTATION */
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* TEXT */
.music-title{
  color:white;
  font-size:14px;
  font-weight:bold;
  white-space:nowrap;
}

    @keyframes spin{
      from{transform:rotate(0deg);}
      to{transform:rotate(0deg);}
    }

    .paused .cassette{
      animation-play-state:paused;
      opacity:0.5;
    }

    /* TITLE */
    .title{
      position:absolute;
      top:30px;
      left:50%;
      transform:translateX(-50%);
      font-size:42px;
      color:white;
      font-weight:bold;
      letter-spacing:2px;
      text-shadow:3px 3px 0px #ff8fb1, 6px 6px 12px rgba(0,0,0,0.15);
      z-index:10;
    }

    .note-paper{
      background:#fffaf0;
      padding:20px 35px;
      border-radius:18px;
      box-shadow:0 8px 20px rgba(0,0,0,0.12),
      inset 0 0 10px rgba(255,192,203,0.25);
      border:3px dashed #ffb6c1;
      margin-bottom:30px;
      transform:rotate(-2deg);
      animation:paperFloat 3s ease-in-out infinite;
    }

    .note{
      font-size:24px;
      color:#ff4f81;
      margin-bottom:10px;
    }

    .note-desc{
      font-size:16px;
      color:#777;
      line-height:1.5;
    }

    .pixel-sun{
      position:absolute;
      top:50px;
      right:70px;
      width:200px;
      height:200px;
      background:#ffd86b;
      border-radius:50%;
      box-shadow:0 0 0 8px #ffe89a, 0 0 30px #fff0b8;
      animation:sunFloat 4s ease-in-out infinite;
    }

    .container{
      text-align:center;
      position:relative;
      z-index:5;
      margin-top:120px;
    }

    .btn{
      padding:18px 45px;
      border:none;
      border-radius:50px;
      background:#ff4f81;
      color:white;
      font-size:24px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 15px rgba(255,79,129,0.5);
      animation:buttonFloat 2s ease-in-out infinite;
    }

    .btn:hover{
      background:#ff2e6f;
      transform:scale(1.08);
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    @keyframes sunFloat{
      0%,100%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
    }

    @keyframes buttonFloat{
      0%,100%{transform:translateY(0px);}
      50%{transform:translateY(-8px);}
    }

    @keyframes paperFloat{
      0%,100%{transform:translateY(0px) rotate(-2deg);}
      50%{transform:translateY(-6px) rotate(1deg);}
    }

    /* 💖 LOVE EFFECT */
.heart {
  position: fixed;
  top: -10px;
  font-size: 20px;
  color: #ff4f81;
  animation: fallLove linear forwards;
  pointer-events: none;
  z-index: 9999;
}

@keyframes fallLove {
  0% {
    transform: translateY(-10px) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) scale(1.5);
    opacity: 0;
  }
}

  </style>
</head>

<body>

  <!-- 🔊 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music/beabadoobee - If You Want To.mp3" type="audio/mpeg">
</audio>

<!-- MUSIC UI -->
<div class="music-control" onclick="toggleMusic()">
  <div class="vinyl"></div>
  <span class="music-title">If You Want To - beabadoobee</span>
</div>

  <h1 class="title">Happy Birthday My Love :3 💖</h1>

  <div class="pixel-sun"></div>

  <div class="container">

    <div class="note-paper">
      <h2 class="note">i have something for you my love 💌</h2>
      <p class="note-desc">
        but baby i'm sowwy if this is all i can give you for now 🥺
      </p>
    </div>

    <button class="btn" onclick="openLetter()">
      Open This Baby 💖
    </button>

  </div>

<script>

const music = document.getElementById("bgMusic");
const ui = document.querySelector(".music-control");

let isPlaying = false;

const startTime = 0;
const endTime = 186;

/* autoplay */
window.addEventListener("load", async () => {
  try {
    music.currentTime = startTime;
    await music.play();
    isPlaying = true;
  } catch (e) {
    console.log("Autoplay diblokir");
  }
});

/* loop bagian lagu */
music.addEventListener("timeupdate", () => {
  if (music.currentTime >= endTime) {
    music.currentTime = startTime;
    music.play();
  }
});

/* fallback klik */
document.addEventListener("click", () => {
  if (!isPlaying) {
    music.currentTime = startTime;
    music.play();
    isPlaying = true;
    ui.classList.remove("paused");
  }
});

/* toggle music */
function toggleMusic(){
  if (music.paused) {
    music.play();
    isPlaying = true;
    ui.classList.remove("paused");
  } else {
    music.pause();
    isPlaying = false;
    ui.classList.add("paused");
  }
}

function openLetter(){
  window.location.href = "gift1.html";
}

/* 💖 LOVE FALL EFFECT */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");

  heart.innerHTML = "💖";

  // posisi random
  heart.style.left = Math.random() * 100 + "vw";

  // ukuran random
  heart.style.fontSize = (16 + Math.random() * 20) + "px";

  // durasi random
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  // hapus setelah selesai animasi
  setTimeout(() => {
    heart.remove();
  }, 6000);
}

/* jalankan terus */
setInterval(createHeart, 400);

</script>

</body>
</html>
